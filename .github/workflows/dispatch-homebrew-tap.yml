name: Notify Homebrew Tap

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_REPO" ]; then
            echo "Missing required secret: HOMEBREW_TAP_REPO (for example: hgenc/homebrew-tap)" >&2
            exit 1
          fi

          if [ -z "$TAP_TOKEN" ]; then
            echo "Missing required secret: HOMEBREW_TAP_TOKEN (classic PAT or fine-grained token with Contents write on tap repo)" >&2
            exit 1
          fi

      - name: Dispatch release event to tap
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.event.release.tag_name }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          curl -fL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            "https://api.github.com/repos/${TAP_REPO}/dispatches" \
            -d "{\"event_type\":\"apple-ai-release\",\"client_payload\":{\"version\":\"${VERSION}\",\"repo\":\"${SOURCE_REPO}\"}}"
